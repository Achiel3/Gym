<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Audio Playlist</title>
    <style>
        :root {
            --spotify-green: #1DB954;
            --bg-black: #121212;
            --card-grey: #181818;
            --text-white: #ffffff;
            --text-grey: #b3b3b3;
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-white);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding-bottom: 120px; /* Ruimte voor de speler */
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 { font-size: 24px; margin-bottom: 20px; }

        /* Input sectie */
        .input-group {
            background: var(--card-grey);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background: #282828;
            border: none;
            color: white;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button.add-btn {
            background: var(--spotify-green);
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        /* Playlist styling */
        .track-list { list-style: none; padding: 0; }

        .track-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border-radius: 5px;
            transition: background 0.3s;
            cursor: pointer;
            margin-bottom: 5px;
        }

        .track-item:hover { background: #282828; }

        .track-info { flex-grow: 1; }
        .track-title { display: block; font-weight: bold; }
        .track-artist { color: var(--text-grey); font-size: 14px; }

        .delete-btn {
            color: var(--text-grey);
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
        }

        /* De Player Bar (Spotify style) */
        .player-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #181818;
            border-top: 1px solid #282828;
            padding: 15px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        audio {
            width: 100%;
            height: 30px;
            filter: invert(100%) hue-rotate(180deg) brightness(1.5); /* Maakt audio player wit/grijs */
        }

        .now-playing {
            font-size: 14px;
            margin-bottom: 8px;
            color: var(--spotify-green);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Mijn TikTok Sounds</h1>

    <div class="input-group">
        <input type="text" id="songTitle" placeholder="Naam van de sound...">
        <input type="text" id="songUrl" placeholder="Directe link naar .mp3...">
        <button class="add-btn" onclick="addTrack()">Voeg toe aan playlist</button>
    </div>

    <div class="track-list" id="playlist">
        </div>
</div>

<div class="player-bar">
    <div class="now-playing" id="status">Kies een sound</div>
    <audio id="mainAudio" controls onended="nextTrack()"></audio>
</div>

<script>
    let songs = JSON.parse(localStorage.getItem('myPlaylist')) || [];

    // Bij het opstarten: toon de lijst
    renderPlaylist();

    function addTrack() {
        const title = document.getElementById('songTitle').value;
        const url = document.getElementById('songUrl').value;

        if(title && url) {
            songs.push({ title: title, url: url });
            saveAndRender();
            document.getElementById('songTitle').value = '';
            document.getElementById('songUrl').value = '';
        } else {
            alert("Vul zowel een naam als een link in!");
        }
    }

    function deleteTrack(index, event) {
        event.stopPropagation(); // Voorkomt dat het liedje gaat spelen als je op delete drukt
        songs.splice(index, 1);
        saveAndRender();
    }

    function playSong(index) {
        const audio = document.getElementById('mainAudio');
        const status = document.getElementById('status');
        
        audio.src = songs[index].url;
        audio.play();
        status.innerText = "Speelt nu: " + songs[index].title;
    }

    function saveAndRender() {
        localStorage.setItem('myPlaylist', JSON.stringify(songs));
        renderPlaylist();
    }

    function renderPlaylist() {
        const listElement = document.getElementById('playlist');
        listElement.innerHTML = '';

        songs.forEach((song, index) => {
            listElement.innerHTML += `
                <div class="track-item" onclick="playSong(${index})">
                    <div class="track-info">
                        <span class="track-title">${song.title}</span>
                        <span class="track-artist">TikTok Audio</span>
                    </div>
                    <button class="delete-btn" onclick="deleteTrack(${index}, event)">×</button>
                </div>
            `;
        });
    }
</script>

</body>
</html>
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym TikTok Audio</title>
    <style>
        :root { --spotify-green: #1DB954; --bg-black: #121212; --card-grey: #181818; --text-white: #ffffff; --text-grey: #b3b3b3; }
        body { background-color: var(--bg-black); color: var(--text-white); font-family: sans-serif; margin: 0; padding-bottom: 150px; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .input-group, .share-group { background: var(--card-grey); padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 5px 0; background: #282828; border: none; color: white; border-radius: 4px; box-sizing: border-box; }
        button { background: var(--spotify-green); color: black; border: none; padding: 10px; border-radius: 20px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 5px; }
        .track-item { display: flex; align-items: center; padding: 10px; border-radius: 5px; cursor: pointer; margin-bottom: 5px; background: rgba(255,255,255,0.05); }
        .track-item:hover { background: #282828; }
        .track-info { flex-grow: 1; }
        .delete-btn { color: #ff4444; background: none; border: none; width: auto; }
        .player-bar { position: fixed; bottom: 0; width: 100%; background: #181818; border-top: 1px solid #282828; padding: 15px; box-sizing: border-box; text-align: center; }
        .controls { display: flex; justify-content: center; gap: 20px; align-items: center; margin-bottom: 10px; }
        .repeat-btn { background: none; color: var(--text-grey); width: auto; font-size: 20px; }
        .repeat-active { color: var(--spotify-green); }
        audio { width: 100%; height: 30px; filter: invert(100%); }
        h2 { border-bottom: 1px solid #282828; padding-bottom: 10px; font-size: 18px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Gym Sounds 🎧</h1>

    <div class="share-group">
        <h2>Openbare Playlist (Global)</h2>
        <div class="track-item" onclick="addGlobal('Phonk Alpha', 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3')">
            <div class="track-info"><strong>Phonk Alpha (Community)</strong></div>
            <span>+ Voeg toe</span>
        </div>
        <button onclick="exportPlaylist()" style="background: #333; color: white;">Deel mijn playlist (Kopieer Code)</button>
        <button onclick="importPlaylist()" style="background: #333; color: white; margin-top: 5px;">Importeer via Code</button>
    </div>

    <div class="input-group">
        <h2>Voeg Nieuwe Sound Toe</h2>
        <input type="text" id="songTitle" placeholder="Naam sound...">
        <input type="text" id="songUrl" placeholder="MP3 Link...">
        <button onclick="addTrack()">Toevoegen</button>
    </div>

    <h2>Jouw Playlist</h2>
    <div id="playlist"></div>
</div>

<div class="player-bar">
    <div id="status" style="font-size: 12px; margin-bottom: 5px;">Kies een nummer</div>
    <div class="controls">
        <button class="repeat-btn" id="repeatBtn" onclick="toggleRepeat()">🔁</button>
    </div>
    <audio id="mainAudio" controls></audio>
</div>

<script>
    let songs = JSON.parse(localStorage.getItem('myPlaylist')) || [];
    let isRepeat = false;

    renderPlaylist();

    function addTrack() {
        const title = document.getElementById('songTitle').value;
        const url = document.getElementById('songUrl').value;
        if(title && url) {
            songs.push({title, url});
            save();
        }
    }

    function addGlobal(title, url) {
        songs.push({title, url});
        save();
        alert('Toegevoegd aan je lijst!');
    }

    function toggleRepeat() {
        isRepeat = !isRepeat;
        document.getElementById('repeatBtn').classList.toggle('repeat-active', isRepeat);
        document.getElementById('mainAudio').loop = isRepeat;
    }

    function save() {
        localStorage.setItem('myPlaylist', JSON.stringify(songs));
        renderPlaylist();
    }

    function renderPlaylist() {
        const list = document.getElementById('playlist');
        list.innerHTML = '';
        songs.forEach((s, i) => {
            list.innerHTML += `
                <div class="track-item">
                    <div class="track-info" onclick="playSong(${i})">
                        <strong>${s.title}</strong>
                    </div>
                    <button class="delete-btn" onclick="deleteTrack(${i})">🗑️</button>
                </div>`;
        });
    }

    function playSong(i) {
        const a = document.getElementById('mainAudio');
        a.src = songs[i].url;
        a.play();
        document.getElementById('status').innerText = "Playing: " + songs[i].title;
    }

    function deleteTrack(i) {
        songs.splice(i, 1);
        save();
    }

    // DEEL SYSTEEM
    function exportPlaylist() {
        const code = btoa(JSON.stringify(songs)); // Maakt een geheime code
        prompt("Kopieer deze code en stuur hem naar je vrienden:", code);
    }

    function importPlaylist() {
        const code = prompt("Plak de code van je vriend hier:");
        if(code) {
            try {
                const newSongs = JSON.parse(atob(code));
                songs = [...songs, ...newSongs];
                save();
            } catch(e) { alert("Ongeldige code!"); }
        }
    }
</script>
</body>
</html>
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Audio: David Laid Edition</title>
    <style>
        :root { --green: #1DB954; --black: #121212; --grey: #282828; --light: #b3b3b3; }
        body { background: var(--black); color: white; font-family: 'Helvetica Neue', sans-serif; margin: 0; padding-bottom: 180px; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; }
        
        .card { background: #181818; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 8px 0; background: var(--grey); border: none; color: white; border-radius: 6px; box-sizing: border-box; }
        button { background: var(--green); color: black; border: none; padding: 12px; border-radius: 25px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s; }
        button:active { transform: scale(0.98); }

        /* Track List */
        .track { display: flex; align-items: center; padding: 12px; border-radius: 8px; margin-bottom: 8px; background: rgba(255,255,255,0.03); cursor: pointer; }
        .track:active { background: var(--grey); }
        .track-img { width: 50px; height: 50px; border-radius: 4px; margin-right: 15px; object-fit: cover; }
        .track-info { flex: 1; }
        
        /* Player Bar (Spotify Look) */
        .player { position: fixed; bottom: 0; width: 100%; background: #070707; padding: 15px 20px; border-top: 1px solid var(--grey); box-sizing: border-box; }
        .now-playing-box { display: flex; align-items: center; margin-bottom: 10px; }
        .current-art { width: 45px; height: 45px; border-radius: 4px; margin-right: 12px; object-fit: cover; border: 1px solid #333; }
        
        .progress-container { width: 100%; height: 4px; background: var(--grey); border-radius: 2px; margin: 10px 0; cursor: pointer; }
        #progress { height: 100%; background: var(--green); width: 0%; border-radius: 2px; }
        .player-controls { display: flex; justify-content: space-around; align-items: center; }
        .icon-btn { background: none; color: var(--light); width: auto; font-size: 24px; cursor: pointer; border: none; }
        .active { color: var(--green); text-shadow: 0 0 10px var(--green); }
    </style>
</head>
<body>

<div class="container">
    <h1 style="letter-spacing: -1px;">GYM <span style="color:var(--green)">AUDIO</span></h1>

    <div class="card">
        <input type="text" id="title" placeholder="Naam van de sound...">
        <input type="text" id="url" placeholder="MP3 Link (eindigt op .mp3)">
        <button onclick="addTrack()">VOEG TOE</button>
    </div>

    <div id="playlist"></div>
</div>

<div class="player">
    <div class="now-playing-box">
        <img src="https://www.tiktok.com/api/img/?itemId=7276224911641677061&location=0&aid=1988" id="currentArt" class="current-art">
        <div style="overflow: hidden;">
            <div id="now-playing-title" style="font-weight: bold; font-size: 14px; white-space: nowrap;">Kies een nummer</div>
            <div style="font-size: 11px; color: var(--light);">TikTok Gym Sound</div>
        </div>
    </div>
    
    <div class="progress-container" onclick="seek(event)">
        <div id="progress"></div>
    </div>

    <div class="player-controls">
        <button class="icon-btn" onclick="shuffle()">🔀</button>
        <button class="icon-btn" style="font-size: 40px; color: white;" id="playBtn" onclick="togglePlay()">▶️</button>
        <button class="icon-btn" id="repeatBtn" onclick="toggleRepeat()">🔁</button>
    </div>
</div>

<audio id="audio" ontimeupdate="updateProgress()" onended="handleEnded()"></audio>

<script>
    let songs = JSON.parse(localStorage.getItem('gym-v4')) || [];
    let isRepeat = false;
    let currentIdx = -1;
    // De link naar de afbeelding van David Laid
    const laidImg = "https://www.tiktok.com/api/img/?itemId=7276224911641677061&location=0&aid=1988";

    function render() {
        const list = document.getElementById('playlist');
        list.innerHTML = '<h3 style="color:var(--light)">Jouw Playlist</h3>';
        songs.forEach((s, i) => {
            list.innerHTML += `
                <div class="track" onclick="playSong(${i})">
                    <img src="${laidImg}" class="track-img">
                    <div class="track-info">
                        <span class="track-title">${s.title}</span>
                    </div>
                    <button style="width:auto; background:none; color:grey;" onclick="deleteSong(${i}, event)">✕</button>
                </div>`;
        });
        localStorage.setItem('gym-v4', JSON.stringify(songs));
    }

    function addTrack() {
        const t = document.getElementById('title').value;
        const u = document.getElementById('url').value;
        if(t && u) { 
            songs.push({title: t, url: u}); 
            render();
            document.getElementById('title').value = '';
            document.getElementById('url').value = '';
        }
    }

    function playSong(i) {
        currentIdx = i;
        const a = document.getElementById('audio');
        const song = songs[i];
        a.src = song.url;
        a.play();
        document.getElementById('playBtn').innerText = "⏸️";
        document.getElementById('now-playing-title').innerText = song.title;
        document.getElementById('currentArt').src = laidImg;
    }

    function togglePlay() {
        const a = document.getElementById('audio');
        if(currentIdx === -1 && songs.length > 0) return playSong(0);
        if(a.paused) { a.play(); document.getElementById('playBtn').innerText = "⏸️"; }
        else { a.pause(); document.getElementById('playBtn').innerText = "▶️"; }
    }

    function updateProgress() {
        const a = document.getElementById('audio');
        if(a.duration) {
            const p = (a.currentTime / a.duration) * 100;
            document.getElementById('progress').style.width = p + "%";
        }
    }

    function seek(e) {
        const a = document.getElementById('audio');
        const container = document.querySelector('.progress-container');
        const pct = e.offsetX / container.offsetWidth;
        a.currentTime = pct * a.duration;
    }

    function toggleRepeat() {
        isRepeat = !isRepeat;
        document.getElementById('repeatBtn').classList.toggle('active', isRepeat);
    }

    function shuffle() {
        songs.sort(() => Math.random() - 0.5);
        render();
    }

    function handleEnded() {
        if(isRepeat) playSong(currentIdx);
        else if(currentIdx < songs.length - 1) playSong(currentIdx + 1);
    }

    function deleteSong(i, e) {
        e.stopPropagation();
        songs.splice(i, 1);
        render();
    }

    render();
</script>
</body>
</html>
