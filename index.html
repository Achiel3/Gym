<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gym Audio Pro</title>
    <style>
        :root { --green: #1DB954; --black: #121212; --grey: #282828; }
        body { background: var(--black); color: white; font-family: sans-serif; margin: 0; padding-bottom: 200px; }
        .container { max-width: 450px; margin: 0 auto; padding: 20px; }
        .card { background: #181818; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #333; }
        input { width: 100%; padding: 12px; margin: 5px 0; background: var(--grey); border: none; color: white; border-radius: 5px; box-sizing: border-box; }
        button { background: var(--green); color: black; border: none; padding: 12px; border-radius: 25px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        .track { display: flex; align-items: center; padding: 10px; border-radius: 8px; background: rgba(255,255,255,0.05); margin-bottom: 8px; cursor: pointer; }
        .track-info { flex: 1; margin-left: 12px; font-weight: bold; }
        .player { position: fixed; bottom: 0; width: 100%; background: #000; padding: 20px; border-top: 1px solid #333; box-sizing: border-box; }
        .progress-bg { width: 100%; height: 5px; background: #333; margin: 15px 0; border-radius: 5px; cursor: pointer; }
        #progress-bar { height: 100%; background: var(--green); width: 0%; border-radius: 5px; }
        .controls { display: flex; justify-content: space-around; align-items: center; }
        .share-section { display: flex; gap: 10px; margin-top: 10px; }
        .share-btn { background: #333; color: white; font-size: 11px; padding: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center; color: var(--green);">GYM AUDIO</h1>
    
    <div class="card">
        <input type="text" id="t" placeholder="Naam van de sound...">
        <input type="text" id="u" placeholder="MP3 Link (eindigt op .mp3)">
        <button onclick="add()">VOEG TOE</button>
        
        <div class="share-section">
            <button class="share-btn" onclick="exportList()">DEEL PLAYLIST</button>
            <button class="share-btn" onclick="importList()">IMPORT PLAYLIST</button>
        </div>
    </div>

    <div id="list"></div>
</div>

<div class="player">
    <div style="display:flex; align-items:center; margin-bottom:10px;">
        <img src="https://i.imgur.com/8vVf3yD.jpeg" width="40" height="40" style="border-radius:4px; margin-right:10px;">
        <div>
            <div id="playing-now" style="font-size:14px; font-weight:bold;">Kies een sound</div>
            <div style="font-size:11px; color:grey;">David Laid Edition</div>
        </div>
    </div>
    <div class="progress-bg" onclick="seek(event)">
        <div id="progress-bar"></div>
    </div>
    <div class="controls">
        <span onclick="toggleShuffle()" id="shuf" style="cursor:pointer; font-size:20px; color:#555;">🔀</span>
        <span onclick="playPause()" id="pp" style="cursor:pointer; font-size:40px;">▶️</span>
        <span onclick="toggleRepeat()" id="rep" style="cursor:pointer; font-size:20px; color:#555;">🔁</span>
    </div>
</div>

<audio id="audio"></audio>

<script>
    let songs = JSON.parse(localStorage.getItem('gym_vFinal')) || [];
    let isRep = false; let isShuf = false; let cur = -1;
    const img = "https://i.imgur.com/8vVf3yD.jpeg";
    const audio = document.getElementById('audio');

    function render() {
        const div = document.getElementById('list');
        div.innerHTML = '';
        songs.forEach((s, i) => {
            div.innerHTML += `
                <div class="track" onclick="start(${i})">
                    <img src="${img}" width="45" height="45" style="border-radius:4px; object-fit:cover;">
                    <div class="track-info">${s.title}</div>
                    <span onclick="del(${i}, event)" style="color:#555; padding:10px;">✕</span>
                </div>`;
        });
        localStorage.setItem('gym_vFinal', JSON.stringify(songs));
    }

    function add() {
        const t = document.getElementById('t').value;
        const u = document.getElementById('u').value;
        if(t && u) { songs.push({title:t, url:u}); render(); document.getElementById('t').value=''; document.getElementById('u').value=''; }
    }

    function start(i) {
        cur = i;
        audio.src = songs[i].url;
        audio.play().catch(e => alert("De link werkt niet. Gebruik een directe .mp3 link!"));
        document.getElementById('pp').innerText = "⏸️";
        document.getElementById('playing-now').innerText = songs[i].title;
    }

    function playPause() {
        if(audio.src) {
            if(audio.paused) { audio.play(); document.getElementById('pp').innerText = "⏸️"; }
            else { audio.pause(); document.getElementById('pp').innerText = "▶️"; }
        } else if(songs.length > 0) { start(0); }
    }

    audio.ontimeupdate = () => {
        const p = (audio.currentTime / audio.duration) * 100;
        document.getElementById('progress-bar').style.width = p + "%";
    };

    audio.onended = () => {
        if(isRep) start(cur);
        else if(isShuf) start(Math.floor(Math.random()*songs.length));
        else if(cur < songs.length - 1) start(cur + 1);
    };

    function toggleRepeat() { isRep = !isRep; document.getElementById('rep').style.color = isRep ? '#1DB954' : '#555'; }
    function toggleShuffle() { isShuf = !isShuf; document.getElementById('shuf').style.color = isShuf ? '#1DB954' : '#555'; }
    function seek(e) { audio.currentTime = (e.offsetX / document.querySelector('.progress-bg').offsetWidth) * audio.duration; }
    function del(i, e) { e.stopPropagation(); songs.splice(i, 1); render(); }

    // DEEL SYSTEEM
    function exportList() {
        const code = btoa(JSON.stringify(songs));
        prompt("Kopieer deze code en stuur hem naar je vrienden:", code);
    }
    function importList() {
        const code = prompt("Plak de code van je vriend hier:");
        if(code) {
            try { songs = JSON.parse(atob(code)); render(); } 
            catch(e) { alert("Code is niet geldig!"); }
        }
    }

    render();
</script>
</body>
</html>
