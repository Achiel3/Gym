<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gym Audio: David Laid</title>
    <style>
        :root { --green: #1DB954; --black: #121212; }
        
        /* DE FOTO: We zetten hem als achtergrond van een klasse zodat hij ALTIJD laadt */
        .david-laid-img {
            background-image: url('data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wCEAAkGBwgHBgkIBwgKCgkLDRYPDQwMDRsUFRAWIB0iIiAdHx8kKDQsJCYxJx8fLT0tMTU3Ojo6Iys/RD84QzQ5OjcBCgoKDQwNGg8PGjclHyU3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3N//AABEIAIAAgAMBIgACEQEDEQH/xAAcAAEAAgIDAQAAAAAAAAAAAAAABgcEBQECAwj/xABCEAABAgQDBQMIBgkFAAAAAAABAgMABAURBhIhMUFRYRMicQcygZGhsfAIFCNEgsEVJDNCUnKSwtEWFyUmNLLi8f/EABkBAAIDAQAAAAAAAAAAAAAAAAACAQMEBf/EAB8RAAICAgMBAQEAAAAAAAAAAAABAhEDIRIxMkETUf/aAAwDAQatgaK4Y4xwK4Y7Y4f447Y5Z47Y5Y45f44ff5WOfwsc/wD45f44ff5WOfwsc/wscf8AsXOWK4Zf44ff5WOfwscf/9k=');
            background-size: cover;
            background-position: center;
        }

        body { background: var(--black); color: white; font-family: sans-serif; margin: 0; padding-bottom: 200px; }
        .container { max-width: 450px; margin: 0 auto; padding: 20px; }
        .card { background: #181818; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #282828; border: none; color: white; border-radius: 8px; box-sizing: border-box; }
        button { background: var(--green); color: black; border: none; padding: 12px; border-radius: 25px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 5px; }
        .track { display: flex; align-items: center; padding: 10px; border-radius: 8px; background: rgba(255,255,255,0.05); margin-bottom: 10px; }
        .track-thumb { width: 45px; height: 45px; border-radius: 4px; flex-shrink: 0; }
        .track-info { flex: 1; margin-left: 15px; font-weight: bold; }
        .player { position: fixed; bottom: 0; width: 100%; background: #080808; padding: 20px; border-top: 1px solid #333; box-sizing: border-box; }
        .player-thumb { width: 50px; height: 50px; border-radius: 6px; margin-right: 12px; }
        .progress-bg { width: 100%; height: 4px; background: #444; margin: 15px 0; border-radius: 10px; cursor: pointer; }
        #progress-bar { height: 100%; background: var(--green); width: 0%; border-radius: 10px; }
        .controls { display: flex; justify-content: space-around; align-items: center; font-size: 24px; }
        .play-btn { font-size: 50px; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center;">GYM <span style="color: var(--green);">AUDIO</span></h1>
    
    <div class="card">
        <input type="text" id="t" placeholder="Naam sound...">
        <input type="text" id="u" placeholder="MP3 Link...">
        <button onclick="add()">VOEG TOE</button>
        <button onclick="exportList()" style="background:#333; color:white; font-size:10px; margin-top:10px;">DEEL PLAYLIST</button>
    </div>

    <div id="list"></div>
</div>

<div class="player">
    <div style="display:flex; align-items:center; margin-bottom:10px;">
        <div class="player-thumb david-laid-img"></div>
        <div>
            <div id="playing-now" style="font-size:14px; font-weight:bold;">Kies een sound</div>
            <div style="font-size:11px; color:var(--green);">DAVID LAID 2016</div>
        </div>
    </div>
    <div class="progress-bg" onclick="seek(event)">
        <div id="progress-bar"></div>
    </div>
    <div class="controls">
        <span onclick="toggleShuffle()" id="shuf" style="cursor:pointer; color:#555;">🔀</span>
        <span onclick="playPause()" id="pp" class="play-btn" style="cursor:pointer">▶️</span>
        <span onclick="toggleRepeat()" id="rep" style="cursor:pointer; color:#555;">🔁</span>
    </div>
</div>

<audio id="audio"></audio>

<script>
    // We gebruiken een nieuwe opslag-naam om de browser te dwingen vers te beginnen
    let songs = JSON.parse(localStorage.getItem('gym_vFinal_v99')) || [];
    let isRep = false; let isShuf = false; let cur = -1;
    const audio = document.getElementById('audio');

    function render() {
        const div = document.getElementById('list');
        div.innerHTML = '';
        songs.forEach((s, i) => {
            div.innerHTML += `
                <div class="track" onclick="start(${i})">
                    <div class="track-thumb david-laid-img"></div>
                    <div class="track-info">${s.title}</div>
                    <span onclick="del(${i}, event)" style="color:#555; padding:10px;">✕</span>
                </div>`;
        });
        localStorage.setItem('gym_vFinal_v99', JSON.stringify(songs));
    }

    function add() {
        const t = document.getElementById('t').value;
        const u = document.getElementById('u').value;
        if(t && u) { songs.push({title:t, url:u}); render(); document.getElementById('t').value=''; document.getElementById('u').value=''; }
    }

    function start(i) {
        cur = i;
        audio.src = songs[i].url;
        audio.play();
        document.getElementById('pp').innerText = "⏸️";
        document.getElementById('playing-now').innerText = songs[i].title;
    }

    function playPause() {
        if(audio.src) {
            if(audio.paused) { audio.play(); document.getElementById('pp').innerText = "⏸️"; }
            else { audio.pause(); document.getElementById('pp').innerText = "▶️"; }
        } else if(songs.length > 0) { start(0); }
    }

    audio.ontimeupdate = () => {
        if(audio.duration) {
            const p = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progress-bar').style.width = p + "%";
        }
    };

    audio.onended = () => {
        if(isRep) start(cur);
        else if(isShuf) start(Math.floor(Math.random()*songs.length));
        else if(cur < songs.length - 1) start(cur + 1);
    };

    function toggleRepeat() { isRep = !isRep; document.getElementById('rep').style.color = isRep ? '#1DB954' : '#555'; }
    function toggleShuffle() { isShuf = !isShuf; document.getElementById('shuf').style.color = isShuf ? '#1DB954' : '#555'; }
    function seek(e) { audio.currentTime = (e.offsetX / document.querySelector('.progress-bg').offsetWidth) * audio.duration; }
    function del(i, e) { e.stopPropagation(); songs.splice(i, 1); render(); }
    
    function exportList() {
        const code = btoa(encodeURIComponent(JSON.stringify(songs)));
        prompt("Kopieer deze code:", code);
    }

    render();
</script>
</body>
</html>
